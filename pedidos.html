<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedidos - El Kraken</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/componentes.css">
</head>
<body>

<div class="app">
  <div id="nav-lateral" class="nav-lateral"></div>

  <div class="contenido">

    <!-- ============ VISTA: LISTA DE MESAS / CUENTAS ABIERTAS ============ -->
    <div id="vista-mesas">
      <div class="encabezado-pagina">
        <h1>Mesas y cuentas abiertas</h1>
        <button class="btn btn--primario btn--grande" id="btn-nueva-cuenta">+ Nueva mesa / pedido</button>
      </div>

      <div class="grid-productos" id="grid-cuentas"></div>
      <p class="texto-suave texto-centro" id="mensaje-sin-cuentas" style="display:none; margin-top:30px;">
        No hay mesas ni pedidos abiertos. Toca "Nueva mesa / pedido" para empezar a tomar una orden.
      </p>
    </div>

    <!-- ============ VISTA: DETALLE DE UNA CUENTA (agregar productos) ============ -->
    <div id="vista-detalle" style="display:none;">
      <div class="encabezado-pagina">
        <h1 id="titulo-cuenta">Mesa</h1>
        <button class="btn btn--secundario" id="btn-volver-mesas">← Volver a mesas</button>
      </div>

      <div class="tarjeta" style="background:#fff8ec; border-left:5px solid var(--color-primario); margin-bottom:16px;">
        <strong>Promoción:</strong> en la compra de cualquier paquete de Boneless o Alitas, agrega las papas de tu preferencia (gajo o francesa) x $49.
      </div>

      <div class="layout-pedido">
        <div>
          <div class="chips-categoria" id="chips-categoria"></div>
          <div class="grid-productos" id="grid-productos"></div>
        </div>

        <div class="panel-pedido">
          <div class="tarjeta">
            <h2>Pedido de esta mesa</h2>
            <div id="lista-pedido"></div>

            <div class="campo" style="margin-top:14px;">
              <label for="notas-pedido">Notas del pedido (opcional)</label>
              <textarea id="notas-pedido" rows="2" placeholder="Ej. sin cebolla, papas gajo..."></textarea>
            </div>

            <div class="total-pedido">
              <span>Total</span>
              <span id="total-pedido">$0.00</span>
            </div>

            <div class="flex gap-sm" style="margin-top:14px;">
              <button class="btn btn--secundario" id="btn-guardar-cuenta" style="flex:1;">💾 Guardar y seguir después</button>
            </div>
            <button class="btn btn--exito btn--grande" id="btn-ir-cobro" style="margin-top:10px;">💵 Cobrar esta cuenta →</button>
            <button class="btn btn--peligro" id="btn-cancelar-cuenta" style="margin-top:10px; width:100%;">🗑️ Cancelar mesa/pedido</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="zona-modal"></div>

<script src="js/utils/utils.js"></script>
<script src="js/data/storage.js"></script>
<script src="js/data/productos.js"></script>
<script src="js/data/cuentas.js"></script>
<script src="js/data/ventas.js"></script>
<script src="js/data/corte.js"></script>
<script src="js/ui/navegacion.js"></script>
<script>
  renderizarNavegacion('pedidos');

  let cuentaActivaId = null;
  let categoriaActiva = 'Todas';

  // ---------- Vista de mesas ----------

  function mostrarVistaMesas() {
    cuentaActivaId = null;
    document.getElementById('vista-detalle').style.display = 'none';
    document.getElementById('vista-mesas').style.display = 'block';
    pintarCuentas();
  }

  function mostrarVistaDetalle(cuentaId) {
    cuentaActivaId = cuentaId;
    document.getElementById('vista-mesas').style.display = 'none';
    document.getElementById('vista-detalle').style.display = 'block';
    categoriaActiva = 'Todas';
    pintarChips();
    pintarProductos();
    pintarPedido();
  }

  function pintarCuentas() {
    const cuentas = CuentasData.obtenerAbiertas();
    const contenedor = document.getElementById('grid-cuentas');
    const mensajeVacio = document.getElementById('mensaje-sin-cuentas');

    if (cuentas.length === 0) {
      contenedor.innerHTML = '';
      mensajeVacio.style.display = 'block';
      return;
    }
    mensajeVacio.style.display = 'none';

    contenedor.innerHTML = cuentas
      .map((c) => {
        const total = CuentasData.calcularTotal(c);
        const numArticulos = c.items.reduce((s, i) => s + i.cantidad, 0);
        return `
          <button class="tarjeta-producto" data-id="${c.id}" style="min-height:110px;">
            <span class="tarjeta-producto__categoria">${numArticulos} artículo(s)</span>
            <span class="tarjeta-producto__nombre">🍽️ ${c.nombre}</span>
            <span class="tarjeta-producto__precio">${Utils.formatoMoneda(total)}</span>
          </button>
        `;
      })
      .join('');

    contenedor.querySelectorAll('.tarjeta-producto').forEach((tarjeta) => {
      tarjeta.addEventListener('click', () => mostrarVistaDetalle(tarjeta.dataset.id));
    });
  }

  function abrirModalNuevaCuenta() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-formulario">
        <h2>Nueva mesa / pedido</h2>
        <div class="campo">
          <label for="input-nombre-cuenta">Número de mesa o nombre del cliente</label>
          <input type="text" id="input-nombre-cuenta" placeholder="Ej. Mesa 3, Juan (para llevar)...">
        </div>
        <div class="modal-formulario__botones">
          <button class="btn btn--secundario" id="btn-cancelar-modal" style="flex:1;">Cancelar</button>
          <button class="btn btn--primario" id="btn-crear-cuenta" style="flex:1;">Crear</button>
        </div>
      </div>
    `;
    document.getElementById('zona-modal').appendChild(overlay);
    const input = overlay.querySelector('#input-nombre-cuenta');
    input.focus();

    const crear = () => {
      const nombre = input.value.trim();
      if (!nombre) {
        Utils.notificar('Escribe un número de mesa o nombre', 'error');
        return;
      }
      const cuenta = CuentasData.crear(nombre);
      overlay.remove();
      mostrarVistaDetalle(cuenta.id);
    };

    overlay.querySelector('#btn-cancelar-modal').addEventListener('click', () => overlay.remove());
    overlay.querySelector('#btn-crear-cuenta').addEventListener('click', crear);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') crear(); });
  }

  document.getElementById('btn-nueva-cuenta').addEventListener('click', abrirModalNuevaCuenta);
  document.getElementById('btn-volver-mesas').addEventListener('click', mostrarVistaMesas);

  // ---------- Vista de detalle (agregar productos a la cuenta activa) ----------

  function pintarChips() {
    const productos = ProductosData.obtenerActivos();
    const categorias = ['Todas', ...new Set(productos.map((p) => p.categoria))];

    document.getElementById('chips-categoria').innerHTML = categorias
      .map((cat) => `<div class="chip ${cat === categoriaActiva ? 'activo' : ''}" data-categoria="${cat}">${cat}</div>`)
      .join('');

    document.querySelectorAll('.chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        categoriaActiva = chip.dataset.categoria;
        pintarChips();
        pintarProductos();
      });
    });
  }

  function pintarProductos() {
    let productos = ProductosData.obtenerActivos();
    if (categoriaActiva !== 'Todas') {
      productos = productos.filter((p) => p.categoria === categoriaActiva);
    }

    const contenedor = document.getElementById('grid-productos');

    if (productos.length === 0) {
      contenedor.innerHTML = `<p class="texto-suave">No hay productos en esta categoría.</p>`;
      return;
    }

    contenedor.innerHTML = productos
      .map(
        (p) => `
        <button class="tarjeta-producto" data-id="${p.id}">
          <span class="tarjeta-producto__categoria">${p.categoria}</span>
          <span class="tarjeta-producto__nombre">${p.nombre}</span>
          <span class="tarjeta-producto__precio">${Utils.formatoMoneda(p.precio)}</span>
        </button>
      `
      )
      .join('');

    contenedor.querySelectorAll('.tarjeta-producto').forEach((tarjeta) => {
      tarjeta.addEventListener('click', () => {
        const producto = ProductosData.obtenerPorId(tarjeta.dataset.id);
        CuentasData.agregarProducto(cuentaActivaId, producto, 1);
        pintarPedido();
        Utils.notificar(`${producto.nombre} agregado`, 'exito');
      });
    });
  }

  function pintarPedido() {
    const cuenta = CuentasData.obtenerPorId(cuentaActivaId);
    if (!cuenta) { mostrarVistaMesas(); return; }

    document.getElementById('titulo-cuenta').textContent = `🍽️ ${cuenta.nombre}`;

    const contenedor = document.getElementById('lista-pedido');

    if (cuenta.items.length === 0) {
      contenedor.innerHTML = `<div class="pedido-vacio">Toca un producto para agregarlo a esta mesa.</div>`;
    } else {
      contenedor.innerHTML = cuenta.items
        .map(
          (item) => `
          <div class="linea-pedido">
            <div style="flex:1;">
              <div class="linea-pedido__nombre">${item.nombre}</div>
              <div class="linea-pedido__precio-unitario">${Utils.formatoMoneda(item.precio)} c/u</div>
            </div>
            <div class="control-cantidad">
              <button data-accion="restar" data-id="${item.productoId}">−</button>
              <span>${item.cantidad}</span>
              <button data-accion="sumar" data-id="${item.productoId}">+</button>
            </div>
            <div class="linea-pedido__subtotal">${Utils.formatoMoneda(item.precio * item.cantidad)}</div>
            <button class="btn-eliminar-linea" data-accion="eliminar" data-id="${item.productoId}">✕</button>
          </div>
        `
        )
        .join('');
    }

    document.getElementById('total-pedido').textContent = Utils.formatoMoneda(CuentasData.calcularTotal(cuenta));
    document.getElementById('notas-pedido').value = cuenta.notas || '';
    document.getElementById('btn-ir-cobro').disabled = cuenta.items.length === 0;

    contenedor.querySelectorAll('[data-accion]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.id;
        const cuentaAhora = CuentasData.obtenerPorId(cuentaActivaId);
        const item = cuentaAhora.items.find((i) => i.productoId === id);
        if (!item) return;

        if (btn.dataset.accion === 'sumar') {
          CuentasData.cambiarCantidad(cuentaActivaId, id, item.cantidad + 1);
        } else if (btn.dataset.accion === 'restar') {
          CuentasData.cambiarCantidad(cuentaActivaId, id, item.cantidad - 1);
        } else if (btn.dataset.accion === 'eliminar') {
          CuentasData.eliminarProducto(cuentaActivaId, id);
        }
        pintarPedido();
      });
    });
  }

  document.getElementById('notas-pedido').addEventListener('input', (e) => {
    CuentasData.actualizarNotas(cuentaActivaId, e.target.value);
  });

  document.getElementById('btn-guardar-cuenta').addEventListener('click', () => {
    Utils.notificar('Pedido guardado. Puedes seguir agregando más tarde.', 'exito');
    mostrarVistaMesas();
  });

  document.getElementById('btn-cancelar-cuenta').addEventListener('click', async () => {
    const confirmado = await Utils.confirmar('¿Cancelar esta mesa/pedido? Se perderán los productos agregados.');
    if (confirmado) {
      CuentasData.cerrar(cuentaActivaId);
      Utils.notificar('Mesa/pedido cancelado');
      mostrarVistaMesas();
    }
  });

  document.getElementById('btn-ir-cobro').addEventListener('click', () => {
    window.location.href = `cobro.html?cuenta=${cuentaActivaId}`;
  });

  mostrarVistaMesas();
</script>

</body>
</html>
